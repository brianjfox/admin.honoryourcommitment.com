# Nginx for the admin site. Serves the SPA and proxies /api/* to the admin
# backend on localhost:4000 (same origin → the httpOnly session cookie works
# and no CORS is needed). Obtain TLS with:
#   certbot --nginx -d admin.honoryourcommitment.com
#
# IMPORTANT: this is a staff tool over sensitive data. Strongly consider
# restricting access (IP allowlist / VPN / Cloudflare Access). An example
# allowlist block is included below, commented out.

server {
    listen 80;
    listen [::]:80;
    server_name admin.honoryourcommitment.com;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.honoryourcommitment.com;

    # ssl_certificate / ssl_certificate_key are managed by certbot.

    # --- Optional: restrict to known networks (recommended) ---
    # allow 203.0.113.0/24;   # office / VPN range
    # deny all;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    root /var/www/admin.honoryourcommitment.com;
    index index.html;
    client_max_body_size 256k;

    # SPA assets + history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Admin API (same origin).
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
